<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} - bunq AI Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bunq: {
                            green: '#1BB55C',
                            darkgreen: '#149E4F',
                            lightgray: '#F5F7FA',
                            gray: '#E0E4E9',
                            darkgray: '#8C9AAD',
                            dark: '#2D3748'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #F5F7FA;
        }
        .nav-link {
            position: relative;
        }
        .nav-link.active {
            color: #1BB55C;
            font-weight: 500;
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #1BB55C;
        }
        .btn-bunq {
            transition: all 0.2s ease;
        }
        .btn-bunq:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(27, 181, 92, 0.1);
        }
        .table-container {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="font-sans text-bunq-dark min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Header -->
        <header class="py-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-bunq-green rounded-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <span class="text-xl font-semibold">bunq AI Agent</span>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="bg-white rounded-lg shadow-sm mb-8">
            <div class="px-6 py-4">
                <div class="flex space-x-8">
                    <a href="{{ url_for('index') }}" class="nav-link px-1 py-2 text-gray-600 hover:text-bunq-green transition-colors duration-200 {% if request.path == url_for('index') %}active{% endif %}">
                        Home
                    </a>
                    <a href="{{ url_for('get_transactions') }}" class="nav-link px-1 py-2 text-gray-600 hover:text-bunq-green transition-colors duration-200 {% if request.path == url_for('get_transactions') %}active{% endif %}">
                        Transactions
                    </a>
                    <!-- Add other navigation links as needed -->
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="bg-white rounded-lg shadow-sm p-6 mb-8">
            {% block content %}
            <!-- Default content if no block is provided -->
            <div class="flex flex-col items-center justify-center py-12">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-bunq-green mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <h1 class="text-2xl font-semibold mb-2">Welcome to bunq AI Agent</h1>
                <p class="text-gray-600">Select an option from the navigation menu to get started.</p>
            </div>
            {% endblock %}
        </main>

        <!-- Footer -->
        <footer class="py-6">
            <div class="text-center text-sm text-bunq-darkgray">
                <p>&copy; 2025 hackathon Troy. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- JavaScript for active navigation highlighting -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                const linkPath = link.getAttribute('href');
                if (currentPath === linkPath) {
                    link.classList.add('active');
                }
            });
        });
    </script>

</html>
